name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # 从 Base64 解码 keystore（仅 release 构建）
      - name: Decode keystore
        if: github.event.inputs.build_type == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          if [ -n "${{ secrets.SIGNING_KEY_BASE64 }}" ]; then
            echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > app/traktneosync.keystore
            echo "Keystore decoded successfully"
          fi
      
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: ./gradlew assembleDebug
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          NEODB_CLIENT_ID: ${{ secrets.NEODB_CLIENT_ID }}
          NEODB_CLIENT_SECRET: ${{ secrets.NEODB_CLIENT_SECRET }}
      
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          NEODB_CLIENT_ID: ${{ secrets.NEODB_CLIENT_ID }}
          NEODB_CLIENT_SECRET: ${{ secrets.NEODB_CLIENT_SECRET }}
      
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
      
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  create-release:
    if: github.event.inputs.build_type == 'release' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./release
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/*.apk
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
